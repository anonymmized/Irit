<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="104" y1="62" x2="1490" y2="872" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8EFE1"/>
      <stop offset="0.5" stop-color="#EEF7F2"/>
      <stop offset="1" stop-color="#E5ECFB"/>
    </linearGradient>
    <linearGradient id="board" x1="110" y1="212" x2="1490" y2="844" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="1" stop-color="#F8FBFE" stop-opacity="0.74"/>
    </linearGradient>
    <linearGradient id="card1" x1="134" y1="256" x2="378" y2="504" gradientUnits="userSpaceOnUse">
      <stop stop-color="#153F57"/>
      <stop offset="1" stop-color="#102C3E"/>
    </linearGradient>
    <linearGradient id="card2" x1="406" y1="256" x2="650" y2="504" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2B6E59"/>
      <stop offset="1" stop-color="#1E5040"/>
    </linearGradient>
    <linearGradient id="card3" x1="678" y1="256" x2="922" y2="504" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A85F2D"/>
      <stop offset="1" stop-color="#7F431B"/>
    </linearGradient>
    <linearGradient id="card4" x1="950" y1="256" x2="1194" y2="504" gradientUnits="userSpaceOnUse">
      <stop stop-color="#525CC3"/>
      <stop offset="1" stop-color="#38439A"/>
    </linearGradient>
    <linearGradient id="card5" x1="1222" y1="256" x2="1466" y2="504" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B84F76"/>
      <stop offset="1" stop-color="#88344F"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="920" fill="url(#bg)"/>
  <circle cx="198" cy="150" r="138" fill="#F7C996" fill-opacity="0.14"/>
  <circle cx="1374" cy="768" r="212" fill="#8BB1FF" fill-opacity="0.10"/>
  <circle cx="420" cy="812" r="168" fill="#7CD5B7" fill-opacity="0.10"/>

  <text x="110" y="146" fill="#122537" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="72" font-weight="700">How Irit works</text>
  <text x="110" y="198" fill="#506C80" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="28">One script, one SSH run, one bundle with the final VLESS URI.</text>

  <g>
    <rect x="94" y="220" width="1412" height="628" rx="34" fill="url(#board)" stroke="#D4DFE8"/>
    <line x1="242" y1="380" x2="1358" y2="380" stroke="#A9BCCB" stroke-width="8" stroke-linecap="round"/>

    <g>
      <rect x="134" y="258" width="244" height="246" rx="28" fill="url(#card1)"/>
      <circle cx="182" cy="310" r="26" fill="#EAF6FF" fill-opacity="0.20"/>
      <text x="171" y="319" fill="#EAF6FF" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="28" font-weight="700">1</text>
      <text x="220" y="318" fill="#EAF6FF" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="30" font-weight="700">Connect</text>
      <text x="166" y="368" fill="#F2F8FC" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="18">
        <tspan x="166" dy="0">SSH password</tspan>
        <tspan x="166" dy="30">or SSH key</tspan>
      </text>
      <text x="166" y="432" fill="#BDD0DC" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="20">
        <tspan x="166" dy="0">Fast start.</tspan>
        <tspan x="166" dy="28">No manual prep.</tspan>
      </text>
    </g>

    <g>
      <rect x="406" y="258" width="244" height="246" rx="28" fill="url(#card2)"/>
      <circle cx="454" cy="310" r="26" fill="#F0FFF8" fill-opacity="0.20"/>
      <text x="443" y="319" fill="#F0FFF8" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="28" font-weight="700">2</text>
      <text x="492" y="318" fill="#F0FFF8" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="30" font-weight="700">Detect</text>
      <text x="438" y="368" fill="#F4FFFB" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="18">
        <tspan x="438" dy="0">root or sudo</tspan>
        <tspan x="438" dy="30">fresh or existing</tspan>
      </text>
      <text x="438" y="432" fill="#CFE8DE" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="20">
        <tspan x="438" dy="0">Auto mode picks</tspan>
        <tspan x="438" dy="28">the safe next step.</tspan>
      </text>
    </g>

    <g>
      <rect x="678" y="258" width="244" height="246" rx="28" fill="url(#card3)"/>
      <circle cx="726" cy="310" r="26" fill="#FFF5EC" fill-opacity="0.20"/>
      <text x="715" y="319" fill="#FFF5EC" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="28" font-weight="700">3</text>
      <text x="764" y="318" fill="#FFF5EC" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="30" font-weight="700">Deploy</text>
      <text x="710" y="368" fill="#FFF9F3" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="17">
        <tspan x="710" dy="0">install Xray</tspan>
        <tspan x="710" dy="28">generate keys</tspan>
        <tspan x="710" dy="28">write config</tspan>
      </text>
      <text x="710" y="460" fill="#FFDCC5" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="20">
        <tspan x="710" dy="0">Checkpoint first.</tspan>
        <tspan x="710" dy="28">Retry once on fail.</tspan>
      </text>
    </g>

    <g>
      <rect x="950" y="258" width="244" height="246" rx="28" fill="url(#card4)"/>
      <circle cx="998" cy="310" r="26" fill="#EFF1FF" fill-opacity="0.20"/>
      <text x="987" y="319" fill="#EFF1FF" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="28" font-weight="700">4</text>
      <text x="1036" y="318" fill="#EFF1FF" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="30" font-weight="700">Bundle</text>
      <text x="982" y="368" fill="#F5F7FF" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="17">
        <tspan x="982" dy="0">vless-uri.txt</tspan>
        <tspan x="982" dy="28">client-template</tspan>
        <tspan x="982" dy="28">json</tspan>
      </text>
      <text x="982" y="460" fill="#D9DDFF" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="20">
        <tspan x="982" dy="0">Remote exports and</tspan>
        <tspan x="982" dy="28">local artifacts.</tspan>
      </text>
    </g>

    <g>
      <rect x="1222" y="258" width="244" height="246" rx="28" fill="url(#card5)"/>
      <circle cx="1270" cy="310" r="26" fill="#FFF0F5" fill-opacity="0.20"/>
      <text x="1259" y="319" fill="#FFF0F5" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="28" font-weight="700">5</text>
      <text x="1308" y="318" fill="#FFF0F5" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="30" font-weight="700">Report</text>
      <text x="1254" y="368" fill="#FFF6F9" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="18">
        <tspan x="1254" dy="0">traffic</tspan>
        <tspan x="1254" dy="30">warnings</tspan>
        <tspan x="1254" dy="30">sessions</tspan>
      </text>
      <text x="1254" y="460" fill="#FFD8E3" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="20">
        <tspan x="1254" dy="0">Saved access can</tspan>
        <tspan x="1254" dy="28">be restored later.</tspan>
      </text>
    </g>

    <g>
      <rect x="134" y="560" width="1332" height="222" rx="28" fill="#FFFFFF" fill-opacity="0.82" stroke="#D6E1EA"/>
      <text x="176" y="624" fill="#1A2E3F" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="34" font-weight="700">Result</text>
      <text x="176" y="674" fill="#4E6B7E" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="28">
        <tspan x="176" dy="0">Configure the server fast, keep rollback ready,</tspan>
        <tspan x="176" dy="38">and get a usable VLESS link with ready files.</tspan>
      </text>

      <rect x="1088" y="616" width="138" height="44" rx="22" fill="#12334C"/>
      <text x="1114" y="644" fill="#EAF4FB" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="19" font-weight="600">vless-uri.txt</text>

      <rect x="1240" y="616" width="198" height="44" rx="22" fill="#255E53"/>
      <text x="1264" y="644" fill="#F0FFF7" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="19" font-weight="600">client-template</text>

      <rect x="1158" y="680" width="210" height="44" rx="22" fill="#A35E2E"/>
      <text x="1188" y="708" fill="#FFF7F0" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="19" font-weight="600">client-access.txt</text>
    </g>
  </g>
</svg>
