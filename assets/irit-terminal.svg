<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="64" y1="52" x2="1514" y2="856" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7EBDD"/>
      <stop offset="0.5" stop-color="#EAF6F1"/>
      <stop offset="1" stop-color="#E4EBFB"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(292 706) rotate(33.1) scale(332 252)">
      <stop stop-color="#8CD7C0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#8CD7C0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 170) rotate(18.9) scale(288 228)">
      <stop stop-color="#F2BF84" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#F2BF84" stop-opacity="0"/>
