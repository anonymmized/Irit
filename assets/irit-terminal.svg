  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect x="72" y="72" width="1456" height="756" rx="38" stroke="#F8FBFF" stroke-opacity="0.55"/>
  <circle cx="292" cy="706" r="244" fill="url(#glowLeft)"/>
  <circle cx="1320" cy="170" r="196" fill="url(#glowRight)"/>

  <rect x="104" y="114" width="314" height="672" rx="30" fill="url(#panel)" stroke="#D5E0E8"/>

  <text x="261" y="166" text-anchor="middle" fill="#3E6782" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="22" font-weight="600" letter-spacing="0.08em">XRAY SSH BOOTSTRAP</text>
  <text x="261" y="274" text-anchor="middle" fill="#102334" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="96" font-weight="700">Irit</text>
  <text x="261" y="346" text-anchor="middle" fill="#4C697E" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="33">
    <tspan x="261" dy="0">Fast VLESS + REALITY</tspan>
    <tspan x="261" dy="40">provisioning over SSH.</tspan>
  </text>

  <rect x="126" y="418" width="128" height="44" rx="22" fill="#163550"/>
  <text x="190" y="446" text-anchor="middle" fill="#EBF4FA" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="19" font-weight="600">rollback</text>
  <rect x="270" y="418" width="126" height="44" rx="22" fill="#2A6A5C"/>
  <text x="333" y="446" text-anchor="middle" fill="#EDFFF7" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="19" font-weight="600">bundle</text>

