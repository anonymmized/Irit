    <text x="1267" y="432" text-anchor="middle" fill="#2C180D" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="24" font-weight="700">checkpoint</text>
    <text x="1267" y="464" text-anchor="middle" fill="#2C180D" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="18">rollback available</text>

    <rect x="1152" y="524" width="230" height="136" rx="22" fill="url(#accentCool)" stroke="#27475F"/>
    <text x="1267" y="568" text-anchor="middle" fill="#DAE9F3" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="24" font-weight="700">bundle files</text>
    <text x="1267" y="606" text-anchor="middle" fill="#F3F8FC" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="18">vless-uri.txt</text>
    <text x="1267" y="636" text-anchor="middle" fill="#F3F8FC" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="18">client-access.txt</text>

    <text x="560" y="612" fill="#72E27B" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="25">[OK]</text>
