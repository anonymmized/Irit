    <rect x="466" y="118" width="978" height="70" rx="32" fill="url(#terminalTop)"/>
    <circle cx="510" cy="153" r="8" fill="#FF9168"/>
    <circle cx="538" cy="153" r="8" fill="#FFC068"/>
    <circle cx="566" cy="153" r="8" fill="#63D3A3"/>
    <text x="955" y="161" text-anchor="middle" fill="#A7BACA" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="24">./irit.sh --mode setup --host 203.0.113.10 --copy-uri</text>

    <line x1="528" y1="226" x2="528" y2="708" stroke="#1D3950" stroke-width="4" stroke-linecap="round"/>

    <text x="560" y="252" fill="#43C4FF" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="25">[INFO]</text>
    <text x="670" y="252" fill="#E4EEF6" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="25">Connected to root@203.0.113.10</text>

    <text x="560" y="296" fill="#8BE9D0" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="23">[STEP]</text>
    <text x="670" y="296" fill="#BDD1DD" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="23">Checking root or sudo access</text>

    <text x="560" y="338" fill="#8BE9D0" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="23">[STEP]</text>
    <text x="670" y="338" fill="#BDD1DD" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="23">Preparing Xray and REALITY config</text>

    <rect x="560" y="386" width="542" height="180" rx="24" fill="#102233" stroke="#1D3F56"/>
    <text x="596" y="430" fill="#88E5CA" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="25" font-weight="700">Deployment Plan</text>
    <text x="596" y="470" fill="#AFC6D6" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="22">Target      root@203.0.113.10:22</text>
    <text x="596" y="504" fill="#AFC6D6" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="22">Listen port 443</text>
    <text x="596" y="538" fill="#AFC6D6" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="22">Dest        www.cloudflare.com:443</text>

