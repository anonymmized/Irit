  <text x="261" y="576" text-anchor="middle" fill="#172839" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="31" font-weight="700">What you get</text>
  <text x="261" y="624" text-anchor="middle" fill="#546F82" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="22">
    <tspan x="261" dy="0">Ready VLESS URI</tspan>
    <tspan x="261" dy="36">Local artifact bundle</tspan>
    <tspan x="261" dy="36">Checkpoint before changes</tspan>
    <tspan x="261" dy="36">Readable report after setup</tspan>
  </text>

