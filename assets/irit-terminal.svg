    <rect x="560" y="646" width="822" height="88" rx="18" fill="#102233" stroke="#214760"/>
    <text x="596" y="680" fill="#8DE9D0" font-family="'IBM Plex Sans', 'Segoe UI', sans-serif" font-size="22" font-weight="700">Client Access</text>
    <text x="971" y="710" text-anchor="middle" fill="#FFCF88" font-family="'IBM Plex Mono', 'SFMono-Regular', monospace" font-size="19">vless://3f1c...@203.0.113.10:443?security=reality&amp;pbk=...&amp;sid=...</text>
