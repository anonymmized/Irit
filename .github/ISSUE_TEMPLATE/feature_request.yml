name: Feature request
description: Propose a practical improvement for Irit
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain point does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the feature clearly
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: Why would this make Irit more useful?
